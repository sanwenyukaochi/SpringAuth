server.port=9001
logging.level.org.springframework.security=trace
spring.application.name=spring-oauth-client
app.security-base-url=http://127.0.0.1:8080

# oauth-server info.
# authorization-uri.
# token-uri
# The authentication provider identifies which authentication server performs the authentication and is associated with the oauth-server mentioned above.

# OAuth Server OAuth2 configuration
spring.security.oauth2.client.provider.oauth-server.issuer-uri=http://127.0.0.1:9000
spring.security.oauth2.client.provider.oauth-server.authorizationUri=${spring.security.oauth2.client.provider.oauth-server.issuer-uri}/oauth2/authorize
spring.security.oauth2.client.provider.oauth-server.tokenUri=${spring.security.oauth2.client.provider.oauth-server.issuer-uri}/oauth2/token
spring.security.oauth2.client.registration.messaging-client-oidc.provider=oauth-server
spring.security.oauth2.client.registration.messaging-client-oidc.client-name=Web
spring.security.oauth2.client.registration.messaging-client-oidc.client-id=web-client-id
spring.security.oauth2.client.registration.messaging-client-oidc.client-secret=secret
spring.security.oauth2.client.registration.messaging-client-oidc.client-authentication-method=client_secret_basic
spring.security.oauth2.client.registration.messaging-client-oidc.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.messaging-client-oidc.redirect-uri=http://127.0.0.1:9001/login/oauth2/code/messaging-client-oidc
spring.security.oauth2.client.registration.messaging-client-oidc.scope=profile,openid

# GitHub OAuth2 configuration (see CommonOAuth2Provider)
spring.security.oauth2.client.registration.github.client-name=github
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.client-authentication-method=client_secret_basic
spring.security.oauth2.client.registration.github.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.github.redirect-uri=${GITHUB_REDIRECT_URI:http://127.0.0.1:9001/api/login/oauth2/github/callback}
spring.security.oauth2.client.registration.github.scope=read:user,user:email
spring.security.oauth2.client.provider.github.authorization-uri=https://github.com/login/oauth/authorize
spring.security.oauth2.client.provider.github.token-uri=https://github.com/login/oauth/access_token
spring.security.oauth2.client.provider.github.user-info-uri=https://api.github.com/user
spring.security.oauth2.client.provider.github.user-name-attribute=id

# Google OAuth2 configuration (see CommonOAuth2Provider)
spring.security.oauth2.client.registration.google.client-name=google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
