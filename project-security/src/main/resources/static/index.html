<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub登录</title>
    <style>
        :root {
            --bg: linear-gradient(135deg, #f7efe5 0%, #dceeff 100%);
            --card: rgba(255, 255, 255, 0.86);
            --text: #1f2937;
            --muted: #5b6472;
            --accent: #111827;
            --accent-hover: #0b1220;
            --success: #0f766e;
            --error: #b91c1c;
            --border: rgba(17, 24, 39, 0.08);
        }

        body {
            font-family: "SF Pro Display", "PingFang SC", "Helvetica Neue", sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: min(640px, 100%);
            background: var(--card);
            backdrop-filter: blur(18px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 36px;
            box-shadow: 0 24px 80px rgba(15, 23, 42, 0.16);
        }

        h1 {
            color: var(--text);
            margin: 0 0 12px;
            font-size: 40px;
            letter-spacing: -0.04em;
        }

        p {
            line-height: 1.7;
            color: var(--muted);
            margin: 0 0 18px;
        }

        button {
            padding: 14px 22px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            background-color: var(--accent);
            border: none;
            border-radius: 999px;
            cursor: pointer;
            transition: transform 160ms ease, background-color 160ms ease;
        }

        button:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        .status {
            margin-top: 24px;
            padding: 16px 18px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid var(--border);
            white-space: pre-wrap;
            word-break: break-word;
        }

        .status strong {
            display: block;
            margin-bottom: 6px;
            color: var(--text);
        }

        .status.success strong {
            color: var(--success);
        }

        .status.error strong {
            color: var(--error);
        }
    </style>
</head>
<body>
<div class="container">
    <h1>GitHub OAuth2 Login</h1>
    <p>点击按钮后会以弹窗形式完成 GitHub 授权。授权成功后，回调页会通过 <code>postMessage</code> 把登录结果传回当前页面。</p>
    <button id="github-login">GitHub授权登录</button>
    <div id="status" class="status">
        <strong>当前状态</strong>
        等待发起 GitHub 登录
    </div>
</div>
<script>
    const loginButton = document.getElementById('github-login');
    const statusBox = document.getElementById('status');
    const popupFeatures = 'popup=yes,width=720,height=820,menubar=no,toolbar=no,location=yes,resizable=yes,scrollbars=yes,status=no';
    let loginPopup = null;

    function updateStatus(title, message, type) {
        statusBox.className = `status${type ? ` ${type}` : ''}`;
        statusBox.innerHTML = `<strong>${title}</strong>${message}`;
    }

    loginButton.addEventListener('click', function() {
        updateStatus('当前状态', '正在打开 GitHub 登录弹窗...', '');
        loginPopup = window.open('/api/login/oauth/github', 'github-oauth-login', popupFeatures);
        if (!loginPopup) {
            updateStatus('弹窗被拦截', '浏览器拦截了登录弹窗，请允许当前站点打开弹窗后重试。', 'error');
        }
    });

    window.addEventListener('message', function(event) {
        if (event.origin !== window.location.origin) {
            return;
        }

        const payload = event.data || {};
        if (payload.type === 'OAUTH_LOGIN_SUCCESS') {
            if (payload.token) {
                localStorage.setItem('accessToken', payload.token);
            }
            if (payload.refreshToken) {
                localStorage.setItem('refreshToken', payload.refreshToken);
            }

            updateStatus(
                '登录成功',
                JSON.stringify({
                    token: payload.token || null,
                    refreshToken: payload.refreshToken || null,
                    additionalInfo: payload.additionalInfo || {}
                }, null, 2),
                'success'
            );
            return;
        }

        if (payload.type === 'OAUTH_LOGIN_ERROR') {
            updateStatus(
                '登录失败',
                payload.message || 'GitHub 登录失败，请查看控制台或后端日志。',
                'error'
            );
        }
    });
</script>
</body>
</html>
